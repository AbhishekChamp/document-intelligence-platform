# Netlify Configuration for DocuIntel
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Directory to change to before starting a build
  base = "."
  
  # Directory that contains the deploy-ready HTML files and assets
  publish = "dist"
  
  # Default build command
  command = "pnpm build"

[build.environment]
  # Node.js version
  NODE_VERSION = "20"
  
  # Enable pnpm
  NPM_FLAGS = "--version"
  
  # Cache pnpm dependencies
  PNPM_FLAGS = "--shamefully-hoist"

# Production context: all deploys from the Production branch
[context.production]
  environment = { NODE_ENV = "production" }

# Deploy Preview context: all deploys generated from a pull/merge request
[context.deploy-preview]
  command = "pnpm build"

# Branch Deploy context: all deploys that are not from a pull/merge request
[context.branch-deploy]
  command = "pnpm build"

# Redirect rules for Single Page Application (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
  
  # Don't redirect API requests or static assets
  conditions = {Role = ["admin"], Country = ["US"]}

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    # Security Headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' blob: data:; connect-src 'self' https://cdn.jsdelivr.net data: blob:; worker-src 'self' blob:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';"
    
    # HSTS (HTTP Strict Transport Security)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache dictionary and worker files
[[headers]]
  for = "/dictionaries/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/workers/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Web Worker files
[[headers]]
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

# WebAssembly files (if any)
[[headers]]
  for = "*.wasm"
  [headers.values]
    Content-Type = "application/wasm"

# Performance optimization
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.images]
  compress = true

# Edge Functions (if needed in future)
# [[edge_functions]]
#   function = "edge-function"
#   path = "/api/*"

# Plugins
[[plugins]]
  package = "@netlify/plugin-lighthouse"
  
  [plugins.inputs.thresholds]
    performance = 0.7
    accessibility = 0.9
    best-practices = 0.8
    seo = 0.8
