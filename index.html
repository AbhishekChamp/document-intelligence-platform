<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="DocuIntel - Privacy-first document quality analysis platform with spell checking, grammar analysis, readability metrics, and compliance checking. Optimized for US-English."
        />
        <meta name="theme-color" content="#8b5cf6" />
        <meta name="color-scheme" content="light dark" />

        <!-- Content Security Policy -->
        <meta
            http-equiv="Content-Security-Policy"
            content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' blob: data:;
      connect-src 'self' https://cdn.jsdelivr.net data: blob:;
      worker-src 'self' blob:;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    "
        />

        <!-- Security Headers (will be overridden by server headers if present) -->
        <meta http-equiv="X-Content-Type-Options" content="nosniff" />
        <meta
            http-equiv="Referrer-Policy"
            content="strict-origin-when-cross-origin"
        />

        <!-- Open Graph / Social -->
        <meta
            property="og:title"
            content="DocuIntel | Document Intelligence Platform"
        />
        <meta
            property="og:description"
            content="Privacy-first document quality analysis platform. 100% client-side processing."
        />
        <meta property="og:type" content="website" />

        <title>DocuIntel | Document Intelligence Platform</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <noscript>
            <div
                style="
                    padding: 2rem;
                    text-align: center;
                    font-family: system-ui, sans-serif;
                "
            >
                <h1>JavaScript Required</h1>
                <p>
                    DocuIntel requires JavaScript to function. Please enable
                    JavaScript in your browser settings.
                </p>
            </div>
        </noscript>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
